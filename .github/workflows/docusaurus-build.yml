name: Build and Deploy Zeza Site

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build Docusaurus docs
        run: npm run build

      - name: Assemble static site and docs artifact
        run: |
          set -euo pipefail
          rm -rf public
          mkdir -p public
          rsync -a ./ public/ \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.docusaurus' \
            --exclude='build' \
            --exclude='docs' \
            --exclude='src' \
            --exclude='static' \
            --exclude='docusaurus.config.js' \
            --exclude='sidebars.js' \
            --exclude='package.json' \
            --exclude='package-lock.json'
          mkdir -p public/docs
          cp -R build/* public/docs/
          touch public/.nojekyll
          test -f public/index.html
          test -f public/docs/index.html

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
